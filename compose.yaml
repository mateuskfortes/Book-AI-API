services:
  postgres:
    image: postgres:16-alpine
    container_name: book-ai-postgres
    environment:
      POSTGRES_DB: bookaidb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-ai-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bookaidb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=wQ5Y8z1A9XbLmP2Kr7NfHd3Uv6CeTs9GjQaR4MxYkWp8JnVz2BcEfGhIjKlMnOpQr
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

